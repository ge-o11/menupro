<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 210 56" width="210" height="56">
  <defs>
    <linearGradient id="ig" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2563eb"/>
      <stop offset="100%" stop-color="#38bdf8"/>
    </linearGradient>
  </defs>

  <!-- Icon background -->
  <rect x="0" y="2" width="52" height="52" rx="13" fill="url(#ig)"/>
  <rect x="0" y="2" width="52" height="52" rx="13" fill="none" stroke="rgba(255,255,255,0.18)" stroke-width="1"/>

  <!-- QR finder: top-left -->
  <rect x="7"  y="9"  width="14" height="14" rx="3"   fill="white"/>
  <rect x="11" y="13" width="6"  height="6"  rx="1.2" fill="#1d4ed8"/>

  <!-- QR finder: top-right -->
  <rect x="31" y="9"  width="14" height="14" rx="3"   fill="white"/>
  <rect x="35" y="13" width="6"  height="6"  rx="1.2" fill="#1d4ed8"/>

  <!-- QR finder: bottom-left -->
  <rect x="7"  y="33" width="14" height="14" rx="3"   fill="white"/>
  <rect x="11" y="37" width="6"  height="6"  rx="1.2" fill="#1d4ed8"/>

  <!-- QR data dots -->
  <rect x="32" y="34" width="5.5" height="5.5" rx="1.3" fill="rgba(255,255,255,0.85)"/>
  <rect x="39" y="34" width="5.5" height="5.5" rx="1.3" fill="rgba(255,255,255,0.45)"/>
  <rect x="32" y="41" width="5.5" height="5.5" rx="1.3" fill="rgba(255,255,255,0.45)"/>
  <rect x="39" y="41" width="5.5" height="5.5" rx="1.3" fill="rgba(255,255,255,0.2)"/>

  <!-- Wordmark — same vertical center as icon (y=28) -->
  <text
    x="63" y="38"
    font-family="'Arial Black', 'Helvetica Neue', Arial, sans-serif"
    font-size="30"
    font-weight="900"
    letter-spacing="-0.8"
    fill="white">Menu<tspan fill="#7dd3fc">Pro</tspan></text>
</svg>
