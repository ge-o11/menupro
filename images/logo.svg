<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 52" width="200" height="52">
  <defs>
    <linearGradient id="iconGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e4f97"/>
      <stop offset="100%" stop-color="#2d7fc5"/>
    </linearGradient>
  </defs>

  <!-- Icon: rounded square -->
  <rect x="0" y="0" width="52" height="52" rx="13" fill="url(#iconGrad)"/>

  <!-- QR corner: top-right -->
  <rect x="8"  y="8"  width="15" height="15" rx="3" fill="white" opacity="0.95"/>
  <rect x="12" y="12" width="7"  height="7"  rx="1" fill="#1a3a7a"/>

  <!-- QR corner: bottom-left -->
  <rect x="8"  y="29" width="15" height="15" rx="3" fill="white" opacity="0.95"/>
  <rect x="12" y="33" width="7"  height="7"  rx="1" fill="#1a3a7a"/>

  <!-- QR corner: top-left (in RTL = top-right of icon, here visual top-left) -->
  <rect x="29" y="8"  width="15" height="15" rx="3" fill="white" opacity="0.95"/>
  <rect x="33" y="12" width="7"  height="7"  rx="1" fill="#1a3a7a"/>

  <!-- QR center dots -->
  <rect x="30" y="30" width="6" height="6" rx="1.5" fill="white" opacity="0.7"/>
  <rect x="38" y="30" width="6" height="6" rx="1.5" fill="white" opacity="0.4"/>
  <rect x="30" y="38" width="6" height="6" rx="1.5" fill="white" opacity="0.4"/>

  <!-- Wordmark: Menu (light) + Pro (bold accent) -->
  <text x="64" y="31" font-family="Arial, sans-serif" font-size="22" font-weight="400" fill="#ffffff" letter-spacing="-0.3">Menu</text>
  <text x="119" y="31" font-family="Arial, sans-serif" font-size="22" font-weight="900" fill="#60a5fa" letter-spacing="-0.3">Pro</text>

  <!-- Tagline -->
  <text x="64" y="46" font-family="Arial, sans-serif" font-size="10" font-weight="400" fill="rgba(255,255,255,0.45)" letter-spacing="0.5">DIGITAL QR MENUS</text>
</svg>
