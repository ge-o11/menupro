<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f1f63"/>
      <stop offset="100%" style="stop-color:#1a4fa8"/>
    </linearGradient>
    <linearGradient id="card" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a3a80;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#2260c0;stop-opacity:1"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Subtle grid lines -->
  <line x1="0" y1="210" x2="1200" y2="210" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
  <line x1="0" y1="420" x2="1200" y2="420" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
  <line x1="400" y1="0" x2="400" y2="630" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
  <line x1="800" y1="0" x2="800" y2="630" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>

  <!-- Glow circle -->
  <radialGradient id="glow" cx="50%" cy="50%" r="50%">
    <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:0.18"/>
    <stop offset="100%" style="stop-color:#3b82f6;stop-opacity:0"/>
  </radialGradient>
  <ellipse cx="600" cy="315" rx="420" ry="300" fill="url(#glow)"/>

  <!-- Phone mockup -->
  <rect x="760" y="105" width="180" height="360" rx="22" fill="#06080f" stroke="rgba(255,255,255,0.12)" stroke-width="1.5"/>
  <rect x="770" y="118" width="160" height="334" rx="16" fill="#0d1b3e"/>
  <!-- Notch -->
  <rect x="820" y="118" width="60" height="14" rx="0 0 8 8" fill="#06080f"/>
  <!-- Screen content lines -->
  <rect x="782" y="150" width="136" height="10" rx="3" fill="rgba(255,255,255,0.15)"/>
  <rect x="782" y="170" width="100" height="8" rx="3" fill="rgba(255,255,255,0.08)"/>
  <rect x="782" y="198" width="136" height="1" rx="1" fill="rgba(255,255,255,0.06)"/>
  <rect x="782" y="210" width="80" height="8" rx="3" fill="rgba(96,165,250,0.4)"/>
  <rect x="870" y="210" width="48" height="8" rx="3" fill="rgba(255,255,255,0.1)"/>
  <rect x="782" y="228" width="136" height="1" rx="1" fill="rgba(255,255,255,0.06)"/>
  <rect x="782" y="240" width="90" height="8" rx="3" fill="rgba(255,255,255,0.12)"/>
  <rect x="880" y="240" width="38" height="8" rx="3" fill="rgba(134,239,172,0.5)"/>
  <rect x="782" y="258" width="136" height="1" rx="1" fill="rgba(255,255,255,0.06)"/>
  <rect x="782" y="270" width="70" height="8" rx="3" fill="rgba(255,255,255,0.12)"/>
  <rect x="860" y="270" width="58" height="8" rx="3" fill="rgba(96,165,250,0.3)"/>
  <rect x="782" y="295" width="136" height="32" rx="6" fill="rgba(30,79,151,0.6)"/>
  <rect x="782" y="340" width="136" height="1" rx="1" fill="rgba(255,255,255,0.06)"/>
  <rect x="782" y="352" width="60" height="8" rx="3" fill="rgba(255,255,255,0.1)"/>
  <rect x="850" y="352" width="68" height="8" rx="3" fill="rgba(167,139,250,0.4)"/>
  <!-- QR mini -->
  <rect x="792" y="390" width="36" height="36" rx="4" fill="white"/>
  <rect x="796" y="394" width="12" height="12" rx="1" fill="#0f1f63"/>
  <rect x="812" y="394" width="12" height="12" rx="1" fill="#0f1f63"/>
  <rect x="796" y="410" width="12" height="12" rx="1" fill="#0f1f63"/>
  <rect x="812" y="406" width="4" height="4" fill="#0f1f63"/>
  <rect x="820" y="410" width="4" height="4" fill="#0f1f63"/>
  <rect x="812" y="414" width="12" height="4" rx="1" fill="#0f1f63"/>

  <!-- Left content -->
  <!-- Brand name -->
  <text x="120" y="240" font-family="Arial, sans-serif" font-size="88" font-weight="900" fill="#ffffff" letter-spacing="-2">MenuVPro</text>
  <!-- Accent line -->
  <rect x="120" y="262" width="340" height="3" rx="2" fill="url(#accentLine)"/>
  <linearGradient id="accentLine" x1="0%" y1="0%" x2="100%" y2="0%">
    <stop offset="0%" style="stop-color:#60a5fa;stop-opacity:1"/>
    <stop offset="60%" style="stop-color:#a78bfa;stop-opacity:0.6"/>
    <stop offset="100%" style="stop-color:#a78bfa;stop-opacity:0"/>
  </linearGradient>
  <!-- Tagline -->
  <text x="120" y="318" font-family="Arial, sans-serif" font-size="30" font-weight="400" fill="rgba(255,255,255,0.65)">Digital QR Menus for Modern Businesses</text>
  <!-- Feature pills -->
  <rect x="120" y="350" width="148" height="36" rx="18" fill="rgba(96,165,250,0.12)" stroke="rgba(96,165,250,0.3)" stroke-width="1"/>
  <text x="194" y="374" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#93c5fd" text-anchor="middle">Real-time Updates</text>
  <rect x="280" y="350" width="110" height="36" rx="18" fill="rgba(167,139,250,0.12)" stroke="rgba(167,139,250,0.3)" stroke-width="1"/>
  <text x="335" y="374" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#c4b5fd" text-anchor="middle">AI Powered</text>
  <rect x="402" y="350" width="100" height="36" rx="18" fill="rgba(134,239,172,0.1)" stroke="rgba(134,239,172,0.25)" stroke-width="1"/>
  <text x="452" y="374" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#86efac" text-anchor="middle">QR Code</text>
  <!-- Domain -->
  <text x="120" y="450" font-family="Arial, sans-serif" font-size="26" font-weight="700" fill="rgba(147,197,253,0.75)">menuvpro.com</text>
</svg>
